<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>İstatistikler - Öğretmen</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav>
        <h1>Öğretmen Panel</h1>
        <ul>
            <li><a href="{{ url_for('teacher.dashboard') }}">Anasayfa</a></li>
            <li><a href="{{ url_for('teacher.statistics') }}">İstatistikler</a></li>
            <li><a href="{{ url_for('auth.logout') }}">Çıkış</a></li>
        </ul>
    </nav>
    <div class="container">
        <h2>Ders İstatistikleri</h2>
        
        {% for stat in course_stats %}
        <div class="course-stat">
            <h3>{{ stat.course.name }}</h3>
            <div class="stats-grid">
                <div class="stat-card">
                    <h4>Toplam</h4>
                    <p class="stat-number">{{ stat.total }}</p>
                </div>
                <div class="stat-card success">
                    <h4>Katılan</h4>
                    <p class="stat-number">{{ stat.present }}</p>
                </div>
                <div class="stat-card error">
                    <h4>Katılmayan</h4>
                    <p class="stat-number">{{ stat.absent }}</p>
                </div>
                <div class="stat-card">
                    <h4>Katılım Oranı</h4>
                    <p class="stat-number">%{{ "%.1f"|format(stat.rate) }}</p>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</body>
</html>
