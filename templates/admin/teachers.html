{% extends 'base.html' %}
{% block title %}Ogretmenler — E-Yoklama{% endblock %}
{% block content %}
<h1>Ogretmen Yonetimi</h1>

<div class="card">
    <h3>Yeni Ogretmen Ekle</h3>
    <form method="POST" action="{{ url_for('admin.add_teacher') }}" class="form-inline">
        <div class="form-group">
            <input type="text" name="username" required placeholder="Kullanici adi">
        </div>
        <div class="form-group">
            <input type="email" name="email" required placeholder="E-posta">
        </div>
        <div class="form-group">
            <input type="password" name="password" required placeholder="Sifre">
        </div>
        <div class="form-group">
            <input type="text" name="branch" placeholder="Brans">
        </div>
        <button type="submit" class="btn btn-primary">Ekle</button>
    </form>
</div>

<div class="table-responsive">
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Kullanici Adi</th>
                <th>E-posta</th>
                <th>Brans</th>
            </tr>
        </thead>
        <tbody>
            {% for t in teachers %}
            <tr>
                <td>{{ t.id }}</td>
                <td>{{ t.username }}</td>
                <td>{{ t.email }}</td>
                <td>{{ t.branch or '-' }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
