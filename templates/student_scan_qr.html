<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>QR Kod Okut - Öğrenci</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav>
        <h1>Öğrenci Panel</h1>
        <ul>
            <li><a href="{{ url_for('student.dashboard') }}">Anasayfa</a></li>
            <li><a href="{{ url_for('student.security_check') }}">Yoklama Al</a></li>
            <li><a href="{{ url_for('student.statistics') }}">İstatistikler</a></li>
            <li><a href="{{ url_for('auth.logout') }}">Çıkış</a></li>
        </ul>
    </nav>
    <div class="container">
        <h2>QR Kod Okut</h2>
        
        <div class="scan-options">
            <div class="scan-option">
                <h3>Kamera ile Tara</h3>
                <div id="camera-container">
                    <video id="video" autoplay></video>
                    <canvas id="canvas" style="display:none;"></canvas>
                </div>
                <button id="start-camera" class="btn">Kamerayı Aç</button>
                <button id="scan-qr" class="btn" style="display:none;">QR Tara</button>
            </div>
            
            <div class="scan-option">
                <h3>Manuel Kod Gir</h3>
                <form method="POST" action="{{ url_for('student.process_qr') }}">
                    <input type="text" name="qr_data" placeholder="QR Kod" required>
                    <input type="number" name="course_id" placeholder="Ders ID" required>
                    <button type="submit" class="btn">Yoklama Ver</button>
                </form>
            </div>
        </div>
    </div>
    
    <script>
        // Basit QR tarama mantığı
        document.getElementById('start-camera').addEventListener('click', function() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
                .then(function(stream) {
                    document.getElementById('video').srcObject = stream;
                    document.getElementById('start-camera').style.display = 'none';
                    document.getElementById('scan-qr').style.display = 'inline-block';
                })
                .catch(function(err) {
                    alert('Kamera erişimi reddedildi: ' + err);
                });
        });
    </script>
</body>
</html>
