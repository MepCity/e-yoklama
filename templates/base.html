<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}E-Yoklama{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    
    <!-- Mobil Menü Düzeltmesi -->
    <style>
    @media (max-width: 768px) {
        .nav-links {
            display: flex !important;
            flex-direction: column;
            width: 100%;
            gap: 4px;
        }
        
        .nav-link {
            display: block !important;
            padding: 8px 0;
        }
        
        .nav-user {
            flex-direction: column;
            align-items: flex-start;
            gap: 4px;
        }
        
        .navbar {
            padding: 12px 16px;
        }
        
        .navbar .nav-brand {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }
        
        .navbar .nav-toggle {
            display: block;
        }
    }
    </style>
    
    {% block head %}{% endblock %}
</head>
<body>
    <div id="offlineBanner" class="offline-banner" hidden>Çevrimdışısınız. Yoklama denemeleri bağlantı gelince gönderilecek.</div>
    {% if session.get('user') %}
    {% include 'components/_nav.html' %}
    {% endif %}

    <main class="container">
        {% include 'components/_flash.html' %}
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script src="{{ url_for('static', filename='js/offline.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
