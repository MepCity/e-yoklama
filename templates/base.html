<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}E-Yoklama{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    {% block head %}{% endblock %}
</head>
<body>
    <div id="offlineBanner" class="offline-banner" hidden>Çevrimdışısınız. Yoklama denemeleri bağlantı gelince gönderilecek.</div>
    {% if session.get('user') %}
    {% include 'components/_nav.html' %}
    {% endif %}

    <main class="container">
        {% include 'components/_flash.html' %}
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script src="{{ url_for('static', filename='js/offline.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
